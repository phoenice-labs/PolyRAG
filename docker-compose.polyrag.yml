# docker-compose.polyrag.yml
# ──────────────────────────────────────────────────────────────────────────────
# Spins up all 4 server-based Phoenice-PolyRAG vector backends.
# ChromaDB and FAISS run in-process; only these 4 need Docker.
#
# Usage:
#   docker compose -f docker-compose.polyrag.yml up -d
#   docker compose -f docker-compose.polyrag.yml down
#
# Ports used (chosen to avoid conflicts with other local services):
#   Qdrant    : 6333 (REST), 6334 (gRPC)
#   Weaviate  : 8088 (HTTP), 50052 (gRPC)
#   Milvus    : 19530 (gRPC), 9091 (metrics)
#   PGVector  : 5433 (Postgres + pgvector)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Qdrant ─────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: polyrag_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - polyrag_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Weaviate ────────────────────────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: polyrag_weaviate
    ports:
      - "8088:8080"   # HTTP (using 8088 to avoid conflict with existing :8080)
      - "50052:50051" # gRPC (using 50052 to avoid conflict)
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "polyrag_weaviate"
    volumes:
      - polyrag_weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Milvus (standalone) ────────────────────────────────────────────────────
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: polyrag_milvus_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://milvus-etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - polyrag_etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    container_name: polyrag_milvus_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9002"
    ports:
      - "9002:9002"
    volumes:
      - polyrag_minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.6
    container_name: polyrag_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio
    volumes:
      - polyrag_milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5

  # ── PGVector ────────────────────────────────────────────────────────────────
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: polyrag_pgvector
    ports:
      - "5433:5432"   # external 5433 to avoid conflict with existing postgres on 5432
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: polyrag
    volumes:
      - polyrag_pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polyrag"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  polyrag_qdrant_data:
  polyrag_weaviate_data:
  polyrag_etcd_data:
  polyrag_minio_data:
  polyrag_milvus_data:
  polyrag_pgvector_data:
