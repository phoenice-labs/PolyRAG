[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --tb=short
markers =
    integration: marks tests that require external services (chromadb/faiss/qdrant run without servers)
    lmstudio: marks tests that require LM Studio running at localhost:1234
    browser: marks tests that require a running frontend server + Playwright (http://localhost:3000)
asyncio_mode = auto

# ── Playwright defaults (used by pytest-playwright) ────────────────────────────
# Override per run:  --headed  /  --browser firefox  /  --slowmo 200
base_url = http://localhost:3000
