name: CI

on:
  push:
    branches: [ main, "feature/**", "fix/**", "chore/**" ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # cancel older runs on the same branch on new push

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      # ── CPU-only PyTorch (avoids 2GB+ CUDA download in CI) ───────────────────
      - name: Install CPU-only PyTorch
        run: |
          pip install --upgrade pip
          pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu

      # ── Project dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── spaCy language model (Phase 10 — entity extraction) ──────────────────
      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      # ── Fast test suite (no external services required) ───────────────────────
      #
      # Skipped markers:
      #   integration  → requires Qdrant / Weaviate / Milvus / PGVector servers
      #   lmstudio     → requires LM Studio running at localhost:1234
      #   browser      → requires frontend + Playwright
      #
      - name: Run fast tests
        run: |
          pytest tests/ \
            -m "not integration and not lmstudio and not browser" \
            --tb=short \
            -q \
            --timeout=300
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── Safety-net: rag router contract tests (always run explicitly) ─────────
      - name: Run RAG router safety tests
        run: |
          pytest tests/phase13/test_rag_router.py \
            --tb=short \
            -q \
            --timeout=300
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ── Lint: import sanity check (catches broken imports before test run) ────────
  lint:
    name: Import sanity check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install CPU-only PyTorch
        run: |
          pip install --upgrade pip
          pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check all API routers import cleanly
        run: |
          python -c "
          from api.main import app
          from api.routers import (
              ingest, search, rag, compare, backends,
              graph, evaluate, feedback, chunks, jobs,
              prompts, traces, retrieval_trails, system,
          )
          from api.routers.rag import RagProfile, ScaleHints, ConfidenceThresholds, RagRequest, RagAnswer
          from api.deps import get_pipeline_cache_info, get_bm25_snapshot_info
          from api.jobs import JobStore
          from core.ingestion.loader import stream_chunk_file, estimate_chunk_count
          print('All imports OK')
          "
        env:
          PYTHONPATH: ${{ github.workspace }}
